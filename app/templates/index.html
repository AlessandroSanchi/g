{% extends "base.html" %}

{% block title %}Gioca - Circles Madness{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">🎮 Bullet Hell - Circles Madness</h5>
            </div>
            <div class="card-body d-flex justify-content-center">
                <div class="canvas-container mx-auto" style="text-align: center;">
                    <canvas id="gameCanvas" width="900" height="700" style="border: 2px solid #333; background: #000;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-3">
        <!-- Stats Panel -->
        <div class="card mb-3">
            <div class="card-header bg-info text-white">
                <h6 class="mb-0">📊 Statistiche Attuali</h6>
            </div>
            <div class="card-body">
                <div class="mb-2">
                    <strong>⏱️ Tempo:</strong>
                    <span id="gameTime" class="float-end">0s</span>
                </div>
                <div class="mb-2">
                    <strong>💥 Score:</strong>
                    <span id="gameScore" class="float-end">0</span>
                </div>
                <div class="mb-2">
                    <strong>👾 Nemici:</strong>
                    <span id="gameEnemies" class="float-end">0</span>
                </div>
                <div class="mb-2">
                    <strong>🔫 Colpi:</strong>
                    <span id="gameBullets" class="float-end">0</span>
                </div>
                <div class="mb-2">
                    <strong>💰 Monete:</strong>
                    <span id="gameCoins" class="float-end">0</span>
                </div>
            </div>
        </div>

        <!-- Leaderboard Mini -->
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h6 class="mb-0">🏆 Top 5</h6>
            </div>
            <div class="card-body p-2" id="miniLeaderboard">
                <div class="text-center">
                    <small class="text-muted">Caricamento...</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const CURRENT_USER = "{{ session.username }}";
    
    // Carica mini leaderboard
    fetch('/api/leaderboard?limit=5')
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('miniLeaderboard');
            container.innerHTML = '';
            data.slice(0, 5).forEach((entry, idx) => {
                const div = document.createElement('div');
                div.className = 'mb-1';
                div.innerHTML = `
                    <small>
                        <strong>${idx + 1}. ${entry.username}</strong><br>
                        Score: ${(entry.best_score || 0).toFixed(0)}
                    </small>
                </small>
                `;
                container.appendChild(div);
            });
        });
</script>

<script>
    (function(){
        window.USE_PHASER = true;

        const s1 = document.createElement('script');
        s1.src = 'https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js';

        s1.onload = () => {
            const s2 = document.createElement('script');
            s2.src = '/static/js/phaser_game.js';
            document.body.appendChild(s2);
        };

        document.body.appendChild(s1);
    })();
</script>
{% endblock %}
