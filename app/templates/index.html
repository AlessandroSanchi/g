<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Circles madness</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="topbar">
    <div>Connesso come: <strong>{{ username }}</strong></div>
    <div><a href="/logout">Disconnetti</a></div>
  </div>

  <div class="leaderboard-panel">
  <h3>Records</h3>
  <ol id="leaderboardList"></ol>
  </div>
  <div class="game-area">
    <div class="center-area">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="900" height="700"></canvas>
        <div class="hud">
          <div>Time: <span id="timer">0.000</span>s</div>
          <div id="status"></div>
          <button id="resetBtn">Reset</button>
        </div>
      </div>
    </div>
  </div>


  <script>const CURRENT_USER = "{{ username }}";</script>
  <script src="/static/js/game.js"></script>
  <!-- God mode toggle (bottom-right) -->
  <div id="godToggle" class="god-toggle">
    <label><input type="checkbox" id="godCheckbox"> God Mode</label>
  </div>
</body>
</html>
