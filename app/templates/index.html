<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Circles Madness</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

  <div class="topbar">
    <div>Connesso come: <strong>{{ username }}</strong></div>
    <div><a href="/logout">Disconnetti</a></div>
  </div>

  <div class="game-area">

    <div class="leaderboard-panel">
      <h3>Records</h3>
      <ol id="leaderboardList"></ol>
    </div>

    <div class="center-area">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="900" height="700"></canvas>

        <div class="hud">
          <div>Time: <span id="timer">0.000</span>s</div>
          <div id="status"></div>
          <button id="resetBtn">Reset</button>
        </div>
      </div>
    </div>

  </div>

  <!-- God mode toggle -->
  <div id="godToggle" class="god-toggle">
    <label>
      <input type="checkbox" id="godCheckbox"> God Mode
    </label>
  </div>

  <script>
    const CURRENT_USER = "{{ username }}";
  </script>
  <script>
    // Prefer Phaser-based game by default (fallback to original canvas left out if missing).
    // We set a global flag so `phaser_game.js` can decide to run.
    (function(){
      const usePhaser = true; // prefer Phaser version
      window.USE_PHASER = usePhaser;
      // load Phaser then our phaser script
      const s1 = document.createElement('script');
      s1.src = 'https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js';
      s1.onload = ()=>{
        const s2 = document.createElement('script');
        s2.src = '/static/js/phaser_game.js';
        document.body.appendChild(s2);
      };
      document.body.appendChild(s1);
    })();
  </script>

</body>
</html>
